  <!-- Bracket on the right -->
  <path d="M 700 60 L 715 60 L 715 330 L 700 330" fill="none" stroke="black" stroke-width="1.5" />
  <text x="730" y="195" dominant-baseline="central" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="black">log n</text>
